<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Clone - Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-header">
          <button class="menu-toggle" id="menu-toggle" title="Toggle sidebar">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
          </button>
          <span class="logo">
            <span class="gemini-gradient">Gemini</span> Clone
          </span>
        </div>

        <button class="new-chat-btn" id="new-chat-btn">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
          <span>New Chat</span>
        </button>
      </div>

      <div class="sidebar-middle">
        <div class="conversations-section">
          <h3>Recent Chats</h3>
          <div id="conversations-list" class="conversations-list">
            <!-- Chat conversations will be loaded here -->
          </div>
        </div>
      </div>

      <div class="sidebar-bottom">
        <div class="user-section">
          <div class="user-info">
            <img
              id="user-avatar"
              class="user-avatar"
              alt="User"
              title="Profile"
            />
            <div class="user-details">
              <p id="user-name" class="user-name">User</p>
              <p class="user-email">user@example.com</p>
            </div>
          </div>
          <button class="user-menu-btn" id="user-menu-btn" title="User menu">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"
              />
            </svg>
          </button>
        </div>

        <!-- User Menu Dropdown -->
        <div class="user-menu" id="user-menu" style="display: none">
          <a href="#" class="menu-item" id="profile-menu">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
              />
            </svg>
            <span>Profile Settings</span>
          </a>
          <a href="#" class="menu-item" id="logout-menu">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
              />
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-container">
      <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
          <button
            class="sidebar-toggle"
            id="sidebar-toggle"
            title="Toggle sidebar"
          >
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
          </button>
          <h1 id="chat-title">Gemini Clone</h1>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messages-area">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">
              <svg
                viewBox="0 0 120 120"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="60"
                  cy="60"
                  r="55"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M40 60a20 20 0 1 1 40 0 20 20 0 0 1-40 0z"
                  fill="currentColor"
                />
              </svg>
            </div>
            <h2>Meet <span class="gemini-gradient">Gemini</span></h2>
            <p>Your personal AI assistant. Ask me anything!</p>
          </div>
          <div id="messages-container" class="messages-container"></div>
        </div>

        <!-- Input Area -->
        <div class="input-section">
          <div class="input-wrapper">
            <textarea
              id="message-input"
              class="message-input"
              placeholder="Ask Gemini..."
              rows="1"
            ></textarea>
            <div class="input-actions">
              <button class="send-btn" id="send-btn" title="Send message">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
              </button>
            </div>
          </div>
          <div class="input-footer">
            <p class="disclaimer">
              Gemini Clone may make mistakes. Always verify important
              information.
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- Loading Modal -->
    <div id="loading-modal" class="modal hidden">
      <div class="modal-content">
        <div class="spinner"></div>
        <p>Processing...</p>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
