<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Clone - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1><span class="gemini-gradient">Gemini</span> Clone</h1>
          <p>Your Personal AI Assistant</p>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <span>Sign In</span>
          </button>
        </form>

        <div class="auth-divider">or</div>

        <button class="btn btn-secondary btn-block" id="signup-toggle">
          Create New Account
        </button>

        <div
          id="error-message"
          class="error-message"
          style="display: none"
        ></div>
      </div>

      <!-- Signup Form (Hidden by default) -->
      <div id="signup-container" class="auth-card hidden">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Join Gemini Clone today</p>
        </div>

        <form id="signup-form" class="auth-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input
              type="text"
              id="signup-name"
              name="name"
              placeholder="John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <input
              type="password"
              id="signup-password"
              name="password"
              placeholder="••••••••"
              minlength="6"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input
              type="password"
              id="signup-confirm"
              name="confirmPassword"
              placeholder="••••••••"
              minlength="6"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <span>Create Account</span>
          </button>
        </form>

        <button class="btn btn-link btn-block" id="login-toggle">
          Back to Login
        </button>

        <div
          id="signup-error-message"
          class="error-message"
          style="display: none"
        ></div>
      </div>
    </div>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
